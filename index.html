<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      border-bottom: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f5f5f5;
    }
  </style>
</head>
<body>

  <h1>Things I Forgot</h1>

  <div class="input-row">
    <input id="forgotInput" placeholder="What did you forget?" />
    <button onclick="addForgot()">Add</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Forgot</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabaseUrl = 'https://wnifvpadsttgyxjellmx.supabase.co'

    const supabaseKey = 'sb_publishable_0TAlUKDZZkCMjYj4FxAV2w_cG3OjZEC'

    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadData() {
      const { data, error } = await supabase
        .from('forgot')
        .select('*')
        .order('created_at', { ascending: false })

      if (error) {
        console.error(error)
        return
      }

      const tableBody = document.getElementById('tableBody')
      tableBody.innerHTML = ''

      data.forEach(item => {
        const row = document.createElement('tr')

        row.innerHTML = `
          <td>${item.text}</td>
          <td>${new Date(item.created_at).toLocaleString()}</td>
        `

        tableBody.appendChild(row)
      })
    }

    async function addForgot() {
      const input = document.getElementById('forgotInput')
      const value = input.value.trim()

      if (!value) return

      const { error } = await supabase
        .from('forgot')
        .insert([{ text: value }])

      if (error) {
        console.error(error)
        alert('Error saving')
        return
      }

      input.value = ''
      loadData()
    }

    window.addForgot = addForgot

    loadData()
  </script>

</body>
</html>
