<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="apple-touch-icon" href="doh.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="loginSection" class="login-section">
    <h1>Inloggen</h1>
    <form id="loginForm" class="login-form">
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="username" required />
      <input id="loginPassword" type="password" placeholder="Wachtwoord" autocomplete="current-password" required />
      <button type="submit">Inloggen</button>
    </form>
    <p id="loginError" class="login-error" hidden></p>
  </section>

  <section id="appSection" class="app-section" hidden>
    <nav class="top-nav">
      <a href="index.html">Vergeten</a>
      <a href="weight.html">Gewicht</a>
      <a href="ai.html" class="active">AI</a>
    </nav>

    <header class="app-header">
      <h1>Chat met AI</h1>
      <button type="button" id="logoutBtn" class="logout-btn">Uitloggen</button>
    </header>

    <div class="input-row">
      <input id="chatInput" placeholder="Stel een vraag..." />
      <button type="button" id="sendBtn">Verstuur</button>
    </div>
    <div id="chatOutput" class="chat-output"></div>
  </section>

  <script type="module" src="js/ai.js"></script>

</body>
</html>
