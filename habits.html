<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="apple-touch-icon" href="doh.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gewoontes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="loginSection" class="login-section">
    <h1>Inloggen</h1>
    <form id="loginForm" class="login-form">
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="username" required />
      <input id="loginPassword" type="password" placeholder="Wachtwoord" autocomplete="current-password" required />
      <button type="submit">Inloggen</button>
    </form>
    <p id="loginError" class="login-error" hidden></p>
  </section>

  <section id="appSection" class="app-section" hidden>
    <nav class="top-nav">
      <a href="index.html">Vergeten</a>
      <a href="weight.html">Gewicht</a>
      <a href="ai.html">AI</a>
      <a href="habits.html" class="active">Gewoontes</a>
    </nav>

    <header class="app-header app-header--habits">
      <h1>Gewoontes</h1>
      <button type="button" id="yesterdayToggle" class="yesterday-toggle" aria-pressed="false">
        Gisteren gedaan
      </button>
      <button type="button" id="logoutBtn" class="logout-btn">Uitloggen</button>
    </header>

    <p id="todayLabel" class="habit-today-label"></p>
    <ul id="habitChecklist" class="habit-today"></ul>

    <div class="habits-grid-wrap">
      <table class="habits-grid" aria-label="Weekoverzicht gewoontes">
        <thead>
          <tr>
            <th scope="col"></th>
            <th scope="col">Ma</th>
            <th scope="col">Di</th>
            <th scope="col">Wo</th>
            <th scope="col">Do</th>
            <th scope="col">Vr</th>
            <th scope="col">Za</th>
            <th scope="col">Zo</th>
          </tr>
        </thead>
        <tbody id="habitsGridBody"></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="js/habits.js"></script>

</body>
</html>
