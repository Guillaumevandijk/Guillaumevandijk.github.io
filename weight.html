<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="apple-touch-icon" href="doh.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gewicht</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="loginSection" class="login-section">
    <h1>Inloggen</h1>
    <form id="loginForm" class="login-form">
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="username" required />
      <input id="loginPassword" type="password" placeholder="Wachtwoord" autocomplete="current-password" required />
      <button type="submit">Inloggen</button>
    </form>
    <p id="loginError" class="login-error" hidden></p>
  </section>

  <section id="appSection" class="app-section" hidden>
    <nav class="top-nav">
      <a href="index.html">Vergeten</a>
      <a href="weight.html" class="active">Gewicht</a>
    </nav>

    <header class="app-header">
      <h1>Mijn gewicht</h1>
      <button type="button" id="logoutBtn" class="logout-btn">Uitloggen</button>
    </header>

    <div class="chart-wrap">
      <canvas id="weightChart" aria-label="Grafiek van gewicht over tijd"></canvas>
    </div>

    <div class="input-row">
      <input id="weightInput" type="number" step="0.1" min="0" placeholder="Gewicht (kg)" />
      <button type="button" id="addWeightBtn">Toevoegen</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Gewicht</th>
          <th>Wanneer</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </section>

  <script type="module" src="js/weight.js"></script>

</body>
</html>
