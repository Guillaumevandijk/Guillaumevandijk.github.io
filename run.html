<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="apple-touch-icon" href="doh.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardlopen</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="loginSection" class="login-section">
    <h1>Inloggen</h1>
    <form id="loginForm" class="login-form">
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="username" required />
      <input id="loginPassword" type="password" placeholder="Wachtwoord" autocomplete="current-password" required />
      <button type="submit">Inloggen</button>
    </form>
    <p id="loginError" class="login-error" hidden></p>
  </section>

  <section id="appSection" class="app-section" hidden>
    <nav class="top-nav">
      <a href="index.html">Vergeten</a>
      <a href="weight.html">Gewicht</a>
      <a href="run.html" class="active">Hardlopen</a>
      <a href="ai.html">AI</a>
      <a href="habits.html">Gewoontes</a>
    </nav>

    <header class="app-header">
      <h1>Hardlopen</h1>
      <button type="button" id="logoutBtn" class="logout-btn">Uitloggen</button>
    </header>

    <div class="chart-toolbar">
      <button type="button" id="forecastToggle" class="forecast-toggle" aria-pressed="false">
        Prognose 6 mnd
      </button>
      <p id="forecastSummary" class="forecast-summary" hidden></p>
    </div>

    <div class="chart-wrap">
      <canvas id="runChart" aria-label="Grafiek van afstand per run"></canvas>
    </div>

    <div class="input-row run-input-row">
      <input id="distanceInput" type="number" step="0.01" min="0" placeholder="Afstand (km)" />
      <input id="tempoInput" type="text" inputmode="numeric" placeholder="Tempo (m:ss/km)" />
      <input id="ratingInput" type="number" min="1" max="10" step="1" placeholder="Kuit (1-10)" />
      <button type="button" id="addRunBtn">Toevoegen</button>
    </div>

    <div class="habits-grid-wrap">
      <table class="habits-grid" aria-label="Weekoverzicht hardlopen">
        <thead>
          <tr>
            <th scope="col"></th>
            <th scope="col">Ma</th>
            <th scope="col">Di</th>
            <th scope="col">Wo</th>
            <th scope="col">Do</th>
            <th scope="col">Vr</th>
            <th scope="col">Za</th>
            <th scope="col">Zo</th>
          </tr>
        </thead>
        <tbody id="runGridBody"></tbody>
      </table>
    </div>

    <table>
      <thead>
        <tr>
          <th>Afstand</th>
          <th>Tempo</th>
          <th>Kuit</th>
          <th>Wanneer</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </section>

  <script type="module" src="js/run.js"></script>

</body>
</html>
